<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Policy Processor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px dashed #667eea;
            border-radius: 8px;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s;
        }

        input[type="file"]:hover {
            border-color: #764ba2;
            background: #f0f1ff;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .status.info {
            background: #e3f2fd;
            color: #1976d2;
            border-left: 4px solid #1976d2;
        }

        .status.success {
            background: #e8f5e9;
            color: #388e3c;
            border-left: 4px solid #388e3c;
        }

        .status.error {
            background: #ffebee;
            color: #d32f2f;
            border-left: 4px solid #d32f2f;
        }

        .results {
            margin-top: 30px;
            display: none;
        }

        .recommendation {
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .recommendation.high-priority {
            border-left-color: #4caf50;
            background: #e8f5e9;
        }

        .recommendation.medium-priority {
            border-left-color: #ff9800;
            background: #fff3e0;
        }

        .recommendation.low-priority {
            border-left-color: #f44336;
            background: #ffebee;
        }

        .recommendation h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .recommendation p {
            margin: 5px 0;
            color: #666;
        }

        .recommendation .confidence {
            display: inline-block;
            padding: 4px 12px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .details {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .next-steps {
            margin-top: 10px;
        }

        .next-steps li {
            margin: 5px 0;
            color: #555;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .config-notice {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .config-notice strong {
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 Document Policy Processor</h1>
            <p>AI-powered insurance policy matching and recommendations</p>
        </div>

        <div class="content">
            <div class="config-notice">
                <strong>⚠️ Configuration Required:</strong> Update the API_BASE_URL in the JavaScript section below with your API Gateway URL.
            </div>

            <form id="uploadForm">
                <div class="form-group">
                    <label for="document">📤 Upload Document</label>
                    <input type="file" id="document" accept=".pdf,.png,.jpg,.jpeg,.txt" required>
                    <small style="color: #666; display: block; margin-top: 5px;">
                        Supported formats: PDF, PNG, JPG, TXT (max 10MB)
                    </small>
                </div>

                <div class="form-group">
                    <label for="symptoms">💬 Describe Your Symptoms</label>
                    <textarea 
                        id="symptoms" 
                        rows="6" 
                        placeholder="Example: I have been experiencing severe headaches and dizziness for the past two weeks..."
                        required
                    ></textarea>
                </div>

                <button type="submit" class="btn" id="submitBtn">
                    🔍 Process Document
                </button>
            </form>

            <div class="spinner" id="spinner"></div>
            <div class="status" id="status"></div>
            <div class="results" id="results"></div>
        </div>
    </div>

    <script>
        // Configuration - UPDATE THIS WITH YOUR API GATEWAY URL
        const API_BASE_URL = 'https://your-api-gateway-url.amazonaws.com/prod';

        const form = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        const statusDiv = document.getElementById('status');
        const resultsDiv = document.getElementById('results');

        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
        }

        function hideStatus() {
            statusDiv.style.display = 'none';
        }

        function showSpinner() {
            spinner.style.display = 'block';
        }

        function hideSpinner() {
            spinner.style.display = 'none';
        }

        async function uploadToS3(file, presignedUrl) {
            const response = await fetch(presignedUrl, {
                method: 'PUT',
                body: file,
                headers: {
                    'Content-Type': file.type
                }
            });

            if (!response.ok) {
                throw new Error('Failed to upload file to S3');
            }
        }

        async function getUploadUrl(filename, fileType) {
            const response = await fetch(`${API_BASE_URL}/api/upload-url`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    filename: filename,
                    file_type: fileType
                })
            });

            if (!response.ok) {
                throw new Error('Failed to get upload URL');
            }

            return await response.json();
        }

        async function processDocument(jobId, documentUrl, symptoms) {
            const response = await fetch(`${API_BASE_URL}/api/process-document`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    job_id: jobId,
                    document_url: documentUrl,
                    symptoms: symptoms
                })
            });

            if (!response.ok) {
                throw new Error('Failed to process document');
            }

            return await response.json();
        }

        function displayResults(data) {
            resultsDiv.innerHTML = '';

            if (!data.recommendations || data.recommendations.length === 0) {
                resultsDiv.innerHTML = `
                    <div class="recommendation">
                        <h3>ℹ️ No Recommendations Found</h3>
                        <p>No policy matches were found for your document and symptoms.</p>
                        <p>This could mean:</p>
                        <ul>
                            <li>No policies match your specific situation</li>
                            <li>The document may not be related to insurance policies</li>
                            <li>Try providing more detailed symptom descriptions</li>
                        </ul>
                    </div>
                `;
            } else {
                const header = document.createElement('h2');
                header.textContent = '💡 Policy Recommendations';
                header.style.marginBottom = '20px';
                resultsDiv.appendChild(header);

                data.recommendations.forEach(rec => {
                    const priorityClass = {
                        1: 'high-priority',
                        2: 'medium-priority',
                        3: 'low-priority'
                    }[rec.priority] || 'medium-priority';

                    const actionEmoji = {
                        'claim': '✅',
                        'review': '⚠️',
                        'exclude': '❌'
                    }[rec.action] || 'ℹ️';

                    const recDiv = document.createElement('div');
                    recDiv.className = `recommendation ${priorityClass}`;
                    recDiv.innerHTML = `
                        <h3>${actionEmoji} ${rec.policy_name}</h3>
                        <p><strong>Policy ID:</strong> ${rec.policy_id}</p>
                        <p><strong>Action:</strong> ${rec.action.toUpperCase()}</p>
                        <p><span class="confidence">${(rec.confidence * 100).toFixed(0)}% Confidence</span></p>
                        <div class="details">
                            <p><strong>Reasoning:</strong></p>
                            <p>${rec.reasoning}</p>
                            <div class="next-steps">
                                <p><strong>Next Steps:</strong></p>
                                <ul>
                                    ${rec.next_steps.map(step => `<li>${step}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    `;
                    resultsDiv.appendChild(recDiv);
                });
            }

            resultsDiv.style.display = 'block';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const fileInput = document.getElementById('document');
            const symptomsInput = document.getElementById('symptoms');

            const file = fileInput.files[0];
            const symptoms = symptomsInput.value.trim();

            if (!file) {
                showStatus('Please select a document', 'error');
                return;
            }

            if (!symptoms || symptoms.length < 10) {
                showStatus('Please provide a detailed symptom description (at least 10 characters)', 'error');
                return;
            }

            // Disable form
            submitBtn.disabled = true;
            hideStatus();
            resultsDiv.style.display = 'none';
            showSpinner();

            try {
                // Step 1: Get presigned URL
                showStatus('Step 1/3: Preparing upload...', 'info');
                const uploadData = await getUploadUrl(file.name, file.type);

                // Step 2: Upload to S3
                showStatus('Step 2/3: Uploading document...', 'info');
                await uploadToS3(file, uploadData.upload_url);

                // Step 3: Process document
                showStatus('Step 3/3: Processing with AI...', 'info');
                const result = await processDocument(
                    uploadData.job_id,
                    uploadData.document_url,
                    symptoms
                );

                // Display results
                hideSpinner();
                showStatus('✅ Processing complete!', 'success');
                displayResults(result);

            } catch (error) {
                hideSpinner();
                showStatus(`❌ Error: ${error.message}`, 'error');
                console.error('Error:', error);
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
