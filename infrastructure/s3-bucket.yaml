AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 bucket for Document Policy Processor - stores uploaded documents, embeddings, and results'

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket
    Default: document-policy-processor-uploads
  
  Environment:
    Type: String
    Description: Environment name
    Default: dev
    AllowedValues:
      - dev
      - prod

Resources:
  DocumentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${BucketName}-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - POST
              - DELETE
              - HEAD
            AllowedOrigins:
              - '*'
            ExposedHeaders:
              - ETag
            MaxAge: 3000
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldResults
            Status: Enabled
            Prefix: results/
            ExpirationInDays: 7
          - Id: DeleteOldDocuments
            Status: Enabled
            Prefix: documents/
            ExpirationInDays: 30
      Tags:
        - Key: Project
          Value: DocumentPolicyProcessor
        - Key: Environment
          Value: !Ref Environment

  DocumentBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DocumentBucket
      PolicyDocument:
        Statement:
          - Sid: AllowLambdaAccess
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: !Sub '${DocumentBucket.Arn}/*'
          - Sid: AllowLambdaListBucket
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - s3:ListBucket
            Resource: !GetAtt DocumentBucket.Arn

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref DocumentBucket
    Export:
      Name: !Sub '${AWS::StackName}-BucketName'
  
  BucketArn:
    Description: ARN of the S3 bucket
    Value: !GetAtt DocumentBucket.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BucketArn'
  
  BucketURL:
    Description: URL of the S3 bucket
    Value: !Sub 'https://${DocumentBucket}.s3.${AWS::Region}.amazonaws.com'
  
  ConsoleURL:
    Description: AWS Console URL for the bucket
    Value: !Sub 'https://s3.console.aws.amazon.com/s3/buckets/${DocumentBucket}'
